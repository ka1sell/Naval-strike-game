<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naval Strike — Spectator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  :root{
    --bg:#070f17; --panel:#0f2436; --line:#1a3a52; --line2:#234a66;
    --sonar:#2dd4bf; --fire:#ff5d5d; --gold:#f5c542; --dim:#5b7c91; --white:#e8f1f5;
  }
  body{
    font-family:'Space Grotesk',sans-serif; background:var(--bg);
    background-image:radial-gradient(circle at 15% 15%, rgba(45,212,191,.06), transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(255,93,93,.05), transparent 45%);
    color:var(--white); min-height:100vh; padding:22px 28px;
  }

  /* JOIN VIEW */
  .join-wrap{ min-height:90vh; display:flex; align-items:center; justify-content:center; }
  .join-card{ background:var(--panel); border:1px solid var(--line2); border-radius:18px; padding:40px 34px; text-align:center; max-width:420px; width:100%; }
  .join-card .icon{ font-size:3rem; margin-bottom:12px; }
  .join-card h2{ font-family:'Space Mono',monospace; font-size:1.3rem; margin-bottom:8px; color:#a78bfa; }
  .join-card p{ color:var(--dim); font-size:.88rem; margin-bottom:24px; line-height:1.6; }
  .join-card input{
    width:100%; padding:16px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); color:var(--white); font-family:'Space Mono',monospace; font-size:1.3rem;
    text-align:center; letter-spacing:.25em; text-transform:uppercase; margin-bottom:16px;
  }
  .join-card input:focus{ outline:none; border-color:#a78bfa; }
  .join-card button{
    width:100%; padding:15px; border-radius:10px; border:none; background:#a78bfa; color:#1a1330;
    font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; cursor:pointer;
  }
  .join-card .err{ color:var(--fire); font-size:.82rem; margin-top:14px; line-height:1.5; display:none; }
  .join-card .err.show{ display:block; }

  /* HEADER */
  header{ display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
  header h1{ font-family:'Space Mono',monospace; font-size:clamp(1.4rem,3vw,2.1rem); letter-spacing:.1em;
    color:var(--sonar); text-shadow:0 0 20px rgba(45,212,191,.35); }
  header h1 span{ color:var(--white); }
  .room-tag{ font-family:'Space Mono',monospace; font-size:1rem; color:var(--gold); letter-spacing:.2em;
    background:var(--panel); border:1px solid var(--gold); padding:8px 18px; border-radius:8px; }
  .phase-tag{
    font-family:'Space Mono',monospace; font-size:.85rem; letter-spacing:.1em; text-transform:uppercase;
    padding:8px 18px; border-radius:8px; border:1px solid var(--line2); color:var(--dim);
  }
  .phase-tag.battle{ color:var(--sonar); border-color:var(--sonar); background:rgba(45,212,191,.08); }
  .phase-tag.over{ color:var(--gold); border-color:var(--gold); background:rgba(245,197,66,.08); }

  .status-line{
    text-align:center; font-family:'Space Mono',monospace; font-size:1.05rem; color:var(--white);
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:22px;
  }
  .status-line b{ color:var(--gold); }

  /* MAIN LAYOUT */
  .main-layout{ display:grid; grid-template-columns: 2.4fr 1fr; gap:22px; align-items:start; }
  @media (max-width:1100px){ .main-layout{ grid-template-columns:1fr; } }

  .boards-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  @media (max-width:900px){ .boards-grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:560px){ .boards-grid{ grid-template-columns:1fr; } }

  .team-board{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px;
    transition: all .2s;
  }
  .team-board.eliminated{ opacity:.45; }
  .team-board.active-turn{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold), 0 0 24px rgba(245,197,66,.25); }
  .tb-head{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .tb-sw{ width:14px; height:14px; border-radius:4px; flex-shrink:0; }
  .tb-name{ font-family:'Space Mono',monospace; font-weight:700; font-size:1rem; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tb-pts{ font-family:'Space Mono',monospace; font-size:.9rem; color:var(--gold); font-weight:700; }
  .tb-lives{ font-size:.85rem; margin-bottom:10px; }
  .tb-elim{ font-family:'Space Mono',monospace; font-size:.78rem; color:var(--fire); margin-bottom:10px; letter-spacing:.05em; }

  .mini-grid{
    display:grid; grid-template-columns:16px repeat(8,1fr); grid-template-rows:16px repeat(8,1fr);
    gap:2px; width:100%; aspect-ratio:9/9;
  }
  .mini-gh{ display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:.5rem; color:var(--dim); }
  .mini-cell{
    background:var(--bg); border:1px solid var(--line); border-radius:3px;
    display:flex; align-items:center; justify-content:center; position:relative; font-size:.6rem;
  }
  .mini-cell.hit{ background:rgba(255,93,93,.25); border-color:var(--fire); }
  .mini-cell.hit::after{ content:'🔥'; font-size:.65rem; }
  .mini-cell.miss{ background:var(--panel); }
  .mini-cell.miss::after{ content:''; width:30%; height:30%; border-radius:50%; background:var(--dim); opacity:.7; }

  /* SIDE PANEL: leaderboard + log */
  .side-panel{ display:flex; flex-direction:column; gap:18px; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; }
  .panel h3{
    font-family:'Space Mono',monospace; font-size:.85rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--dim); margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .panel h3 .dot{ width:9px; height:9px; border-radius:50%; background:var(--sonar); box-shadow:0 0 10px var(--sonar); }

  .lb-item{
    display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px;
    border:1px solid var(--line); margin-bottom:8px; font-family:'Space Mono',monospace; font-size:.92rem;
  }
  .lb-item .rank{ width:22px; text-align:center; color:var(--dim); font-weight:700; font-size:1rem; }
  .lb-item .sw{ width:12px; height:12px; border-radius:3px; flex-shrink:0; }
  .lb-item .name{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-item .pts{ font-weight:800; color:var(--gold); font-size:1.05rem; }
  .lb-item.eliminated{ opacity:.4; }
  .lb-item.first{ border-color:var(--gold); box-shadow:0 0 14px rgba(245,197,66,.25); }

  .log-list{ display:flex; flex-direction:column; gap:8px; max-height:340px; overflow-y:auto; }
  .log-item{ font-family:'Space Mono',monospace; font-size:.78rem; color:var(--dim); line-height:1.5; border-bottom:1px solid var(--line); padding-bottom:8px; }
  .log-item:last-child{ border-bottom:none; }

  /* END OVERLAY */
  .overlay{ position:fixed; inset:0; background:rgba(5,12,18,.92); display:flex; align-items:center; justify-content:center; z-index:50; backdrop-filter:blur(8px); }
  .win-card{ background:var(--panel); border:1px solid var(--line2); border-radius:20px; padding:46px 40px; text-align:center; max-width:460px; width:90%; }
  .win-emoji{ font-size:3.6rem; margin-bottom:14px; }
  .win-label{ font-family:'Space Mono',monospace; font-size:.8rem; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
  .win-name{ font-family:'Space Mono',monospace; font-size:1.6rem; margin-bottom:18px; }
  .order-list{ text-align:left; font-family:'Space Mono',monospace; font-size:.9rem; line-height:2.1; max-height:340px; overflow-y:auto; }
  .order-list .o-rank{ color:var(--gold); margin-right:8px; }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<!-- ══ JOIN VIEW ══ -->
<div class="join-wrap" id="join-view">
  <div class="join-card">
    <div class="icon">📺</div>
    <h2>MODE SPECTATOR</h2>
    <p>Masukkan kode room dari juri untuk menampilkan papan pertandingan di layar ini.<br>Hanya <b>1 layar spectator</b> yang diizinkan per game.</p>
    <input id="join-code" maxlength="6" placeholder="KODE ROOM">
    <button onclick="joinSpectator()">Tampilkan Layar →</button>
    <div class="err" id="join-err"></div>
  </div>
</div>

<!-- ══ MAIN VIEW ══ -->
<div id="main-view" class="hidden">

  <header>
    <h1>NAVAL <span>STRIKE</span></h1>
    <div class="room-tag" id="room-code">------</div>
    <div class="phase-tag" id="phase-tag">LOBBY</div>
  </header>

  <div class="status-line" id="status-line">Memuat...</div>

  <div class="main-layout">
    <div class="boards-grid" id="boards-grid"></div>

    <div class="side-panel">
      <div class="panel">
        <h3><span class="dot"></span> LEADERBOARD</h3>
        <div id="leaderboard"></div>
      </div>
      <div class="panel">
        <h3><span class="dot"></span> RIWAYAT PERTEMPURAN</h3>
        <div class="log-list" id="log-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ END OVERLAY ══ -->
<div class="overlay hidden" id="ov-end">
  <div class="win-card">
    <div class="win-emoji">🏁</div>
    <div class="win-label">Permainan Selesai</div>
    <div class="win-name">Hasil Akhir &amp; Leaderboard</div>
    <div class="order-list" id="order-list"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const SIZE = 8;
const COLS = 'ABCDEFGH';
const SHIP_LEN = 3;
const socket = io();
let currentState = null;
let endShown = false;

function joinSpectator() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  document.getElementById('join-err').classList.remove('show');
  if (!code) {
    showJoinError('Masukkan kode room.');
    return;
  }
  socket.emit('spectator:join', { code });
}

function showJoinError(msg) {
  const err = document.getElementById('join-err');
  err.textContent = msg;
  err.classList.add('show');
}

socket.on('spectator:joined', ({ code }) => {
  document.getElementById('join-view').classList.add('hidden');
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('room-code').textContent = code;
});

socket.on('spectator:full', (msg) => {
  showJoinError(msg);
});

socket.on('errorMsg', (msg) => {
  showJoinError(msg);
});

document.getElementById('join-code').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') joinSpectator();
});

// ── STATE ──
socket.on('state', (state) => {
  currentState = state;
  render();
});

function render() {
  if (!currentState) return;
  const s = currentState;

  document.getElementById('room-code').textContent = s.code;

  const phaseTag = document.getElementById('phase-tag');
  if (s.phase === 'lobby') { phaseTag.textContent = 'LOBBY'; phaseTag.className = 'phase-tag'; }
  else if (s.phase === 'deploy') { phaseTag.textContent = 'DEPLOY'; phaseTag.className = 'phase-tag'; }
  else if (s.phase === 'battle') { phaseTag.textContent = 'PERTEMPURAN'; phaseTag.className = 'phase-tag battle'; }
  else { phaseTag.textContent = 'SELESAI'; phaseTag.className = 'phase-tag over'; }

  let msg = '';
  if (s.phase === 'lobby' || s.phase === 'deploy') {
    const connectedCount = s.teams.filter(t => t.connected).length;
    const placedCount = s.teams.filter(t => t.placed).length;
    msg = `${connectedCount}/6 peserta terhubung — ${placedCount}/6 sudah menempatkan kapal.`;
  } else if (s.phase === 'battle') {
    if (s.pendingFire) {
      const pf = s.pendingFire;
      msg = `${s.teams[pf.teamId].name} mengajukan tembakan di ${COLS[pf.c]}${pf.r+1} — menunggu konfirmasi juri.`;
    } else if (s.activeTeamId !== null) {
      msg = `🎯 ${s.teams[s.activeTeamId].name} sedang memilih koordinat tembakan...`;
    } else {
      msg = `Menunggu juri memberikan giliran tembak.`;
    }
  } else {
    msg = `🏁 Permainan telah selesai.`;
  }
  document.getElementById('status-line').innerHTML = msg;

  renderBoards(s);
  renderLeaderboard(s);
  renderLog(s);

  if (s.phase === 'over') {
    showEndOverlay(s);
  }
}

// ── 6 PAPAN TIM ──
function renderBoards(s) {
  const grid = document.getElementById('boards-grid');
  grid.innerHTML = s.teams.map(t => {
    const isActive = s.activeTeamId === t.id;
    const livesStr = '❤️'.repeat(t.lives) + '🖤'.repeat(SHIP_LEN - t.lives);
    return `
    <div class="team-board ${t.eliminated ? 'eliminated':''} ${isActive ? 'active-turn':''}">
      <div class="tb-head">
        <span class="tb-sw" style="background:${t.color}"></span>
        <span class="tb-name">${escapeHtml(t.name)}</span>
        <span class="tb-pts">${t.points}</span>
      </div>
      ${t.eliminated
        ? `<div class="tb-elim">💥 GUGUR #${t.eliminatedOrder}</div>`
        : `<div class="tb-lives">${livesStr}</div>`
      }
      <div class="mini-grid">${buildMiniGrid(t.cellsRevealed)}</div>
    </div>`;
  }).join('');
}

function buildMiniGrid(cellsRevealed) {
  let html = '<div class="mini-gh"></div>';
  for (let c=0;c<SIZE;c++) html += `<div class="mini-gh">${COLS[c]}</div>`;
  for (let r=0;r<SIZE;r++) {
    html += `<div class="mini-gh">${r+1}</div>`;
    for (let c=0;c<SIZE;c++) {
      const state = cellsRevealed ? cellsRevealed[r][c] : null;
      const cls = state === 'hit' ? 'hit' : state === 'miss' ? 'miss' : '';
      html += `<div class="mini-cell ${cls}"></div>`;
    }
  }
  return html;
}

// ── LEADERBOARD ──
function renderLeaderboard(s) {
  const sorted = [...s.teams].sort((a,b) => b.points - a.points);
  const el = document.getElementById('leaderboard');
  el.innerHTML = sorted.map((t, i) => `
    <div class="lb-item ${t.eliminated ? 'eliminated' : ''} ${i===0 ? 'first' : ''}">
      <span class="rank">${i+1}</span>
      <span class="sw" style="background:${t.color}"></span>
      <span class="name">${escapeHtml(t.name)}</span>
      <span class="pts">${t.points}</span>
    </div>
  `).join('');
}

// ── LOG ──
function renderLog(s) {
  const list = document.getElementById('log-list');
  list.innerHTML = [...s.log].reverse().map(l => `<div class="log-item">${l.msg}</div>`).join('');
}

// ── END OVERLAY ──
function showEndOverlay(s) {
  if (endShown) return;
  endShown = true;
  const sorted = [...s.teams].sort((a,b) => b.points - a.points);
  const list = document.getElementById('order-list');
  list.innerHTML = sorted.map((t,i) => {
    let label;
    if (i===0) label = '🏆 PERINGKAT 1';
    else if (i===1) label = '🥈 PERINGKAT 2';
    else if (i===2) label = '🥉 PERINGKAT 3';
    else label = `Peringkat ${i+1}`;
    const status = t.eliminated ? `gugur #${t.eliminatedOrder}` : `${t.lives} nyawa tersisa`;
    return `<div><span class="o-rank">${label}</span><span style="color:${t.color}">${escapeHtml(t.name)}</span> — <b>${t.points} pts</b> (${status})</div>`;
  }).join('');
  document.getElementById('ov-end').classList.remove('hidden');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
